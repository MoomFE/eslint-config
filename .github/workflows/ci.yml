name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5

      - name: Use Node.js v20
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.2
          registry-url: https://registry.npmjs.org/
          cache: pnpm

      - name: build
        run: pnpm build

      - name: lint
        run: pnpm lint

      - name: test
        run: pnpm test
